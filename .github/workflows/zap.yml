name: OWASP ZAP - DAST

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  zap:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (Dockerfile.zap, Node 18)
        run: docker build -f Dockerfile.zap -t todo-app-zap:latest .

      - name: Start application container
        run: |
          docker run -d -p 3000:3000 --name todo-app todo-app-zap:latest
          for i in {1..30}; do
            if curl -sf http://localhost:3000/items > /dev/null; then
              echo "App is up after $i seconds"
              break
            fi
            sleep 1
          done

      - name: Prepare reports directory with open permissions
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm --network=host \
            --user $(id -u):$(id -g) \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:3000 \
              -J report.json \
              -w report.md \
              -r report.html \
              || true

      - name: List generated reports (debug)
        if: always()
        run: |
          ls -la zap-reports/ || echo "Directory empty"

      - name: Show app logs (debug)
        if: always()
        run: docker logs todo-app

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-reports/
          if-no-files-found: warn
          retention-days: 30